<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Launcher</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div id="app">
      <div class="palette">
        <div class="drag-handle">
          <span class="drag-dots" aria-hidden="true"></span>
        </div>

        <div class="search-bar">
          <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8" />
            <line x1="21" y1="21" x2="16.65" y2="16.65" />
          </svg>
          <input
            id="search-input"
            type="text"
            placeholder="Search apps, files, or type ? to search the web…"
            autocomplete="off"
            spellcheck="false"
          />
          <kbd class="esc-hint">esc</kbd>
          <button id="theme-toggle" title="Toggle light/dark mode" aria-label="Toggle theme">
            <!-- icon injected by renderer.ts -->
          </button>
        </div>

        <ul id="results-list"></ul>

        <div class="footer">
          <span><kbd>↑</kbd><kbd>↓</kbd> navigate</span>
          <span><kbd>↵</kbd> open</span>
          <span><kbd>⌘</kbd><kbd>Space</kbd> toggle</span>
          <span class="footer-tip">tip: <code>? query</code> for web search</span>
        </div>
      </div>
    </div>

    <script type="module" src="../../dist/renderer/renderer.js"></script>
  </body>
</html>
