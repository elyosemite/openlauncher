<svg width="640" height="320" viewBox="0 0 640 320" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    :root {
      --text-color: #1A1B26;
      --accent-1: #7AA2F7;
      --accent-2: #BB9AF7;
      --glow: rgba(122, 162, 247, 0.3);
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --text-color: #FFFFFF;
        --accent-1: #7AA2F7;
        --accent-2: #BB9AF7;
        --glow: rgba(122, 162, 247, 0.5);
      }
    }
    .text-main { fill: var(--text-color); }
    .font-style { font-family: 'JetBrains Mono', 'Fira Code', monospace; font-weight: 800; font-size: 64px; letter-spacing: -4px; }
    
    .glass-back { fill: var(--accent-1); fill-opacity: 0.1; stroke: var(--accent-1); stroke-width: 2; stroke-opacity: 0.2; }
    .glass-front { fill: var(--accent-2); fill-opacity: 0.05; stroke: var(--accent-2); stroke-width: 2; stroke-opacity: 0.3; }
    
    @keyframes pulse {
      0%, 100% { filter: drop-shadow(0 0 5px var(--glow)); opacity: 1; }
      50% { filter: drop-shadow(0 0 15px var(--glow)); opacity: 0.7; }
    }
    .neon-prompt { animation: pulse 2s ease-in-out infinite; }
  </style>

  <!-- Mascot: Glassmorphism Command Box -->
  <g transform="translate(30, 90)">
    <!-- Layered Windows -->
    <rect class="glass-back" x="20" y="20" width="140" height="90" rx="16" transform="rotate(-5, 90, 65)"/>
    <rect class="glass-front" x="30" y="30" width="140" height="90" rx="16" />
    
    <!-- Neon Prompt Symbol -->
    <g class="neon-prompt">
      <path d="M65 60L85 75L65 90" stroke="url(#gradient)" stroke-width="10" stroke-linecap="round" stroke-linejoin="round" />
      <rect x="95" y="85" width="25" height="6" rx="3" fill="url(#gradient)" />
    </g>
    
    <!-- Decorative "AI nodes" -->
    <circle cx="160" cy="40" r="4" fill="var(--accent-1)" opacity="0.6" />
    <circle cx="175" cy="65" r="3" fill="var(--accent-2)" opacity="0.4" />
  </g>

  <!-- Text: OpenLauncher -->
  <text x="220" y="175" class="font-style text-main">Open<tspan fill="url(#gradient)">Launcher</tspan></text>

  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7AA2F7" />
      <stop offset="100%" style="stop-color:#BB9AF7" />
    </linearGradient>
  </defs>
</svg>
