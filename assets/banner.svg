<svg width="640" height="320" viewBox="0 0 640 320" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    :root {
      --text-color: #1A1B26;
      --accent-1: #7AA2F7;
      --accent-2: #BB9AF7;
      --mascot-fill: #24283B;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --text-color: #FFFFFF;
        --accent-1: #7AA2F7;
        --accent-2: #BB9AF7;
        --mascot-fill: #7AA2F7;
      }
    }
    .text-main { fill: var(--text-color); }
    .accent-gradient { fill: url(#gradient); }
    .mascot { fill: var(--mascot-fill); transition: fill 0.3s ease; }
    .font-style { font-family: 'JetBrains Mono', monospace; font-weight: 800; font-size: 64px; letter-spacing: -2px; }
  </style>

  <!-- Mascot: Minimalist Hummingbird (Speed/Agility) -->
  <g transform="translate(60, 110) scale(1.2)">
    <path class="mascot" d="M45 40C45 40 70 20 90 20C110 20 120 40 120 40L90 60L45 40Z" opacity="0.8"/>
    <path class="accent-gradient" d="M10 50C10 50 40 10 70 30C100 50 130 90 130 90L70 90L10 50Z"/>
    <path class="text-main" d="M60 45L140 25" stroke="var(--text-color)" stroke-width="4" stroke-linecap="round"/>
  </g>

  <!-- OpenLauncher Text -->
  <text x="240" y="175" class="font-style text-main">Open<tspan fill="url(#gradient)">Launcher</tspan></text>

  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7AA2F7" />
      <stop offset="1%" style="stop-color:#BB9AF7" />
      <animate attributeName="x1" values="0%;100%;0%" dur="5s" repeatCount="indefinite" />
    </linearGradient>
  </defs>
</svg>
